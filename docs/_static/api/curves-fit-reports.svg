<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-labelledby="title desc">
  <title id="title">Fit report objects</title>
  <desc id="desc">CalibrationReport contains CalibrationPoint rows for both bootstrap and global-fit curves.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d8e1eb; stroke-width: 1.5; rx: 18; ry: 18; }
      .box { stroke: #7c3aed; stroke-width: 1.6; fill: #f5f3ff; rx: 12; ry: 12; }
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #475569; }
      .tag { font: 700 11px Arial, Helvetica, sans-serif; fill: #64748b; letter-spacing: 0.4px; }
      .center { text-anchor: middle; }
      .line { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="760" height="320"/>
  <rect class="panel" x="24" y="24" width="712" height="272"/>
  <text x="380" y="68" class="title center">Fit report objects</text>
  <text x="380" y="92" class="small center">One report model covers bootstrap and global-fit curves.</text>

  <rect x="90" y="126" width="190" height="58" class="box"/>
  <text x="185" y="150" class="label center">Calibration</text>
  <text x="185" y="170" class="label center">Report</text>

  <rect x="478" y="126" width="170" height="58" class="box"/>
  <text x="563" y="150" class="label center">Calibration</text>
  <text x="563" y="170" class="label center">Point</text>

  <rect x="90" y="226" width="190" height="58" class="box"/>
  <text x="185" y="250" class="label center">Global-fit</text>
  <text x="185" y="270" class="label center">fields</text>

  <rect x="478" y="226" width="170" height="58" class="box"/>
  <text x="563" y="250" class="label center">Bond</text>
  <text x="563" y="270" class="label center">diagnostics</text>

  <path d="M 280 155 L 478 155" class="line"/>
  <path d="M 280 255 L 478 255" class="line"/>
  <path d="M 185 184 L 185 226" class="soft-line"/>
  <path d="M 563 184 L 563 226" class="soft-line"/>

  <text x="379" y="146" class="tag center">HAS ROWS</text>
  <text x="379" y="246" class="tag center">STORE DETAILS</text>
  <text x="185" y="209" class="tag center">ON REPORT</text>
  <text x="563" y="209" class="tag center">ON POINT</text>
</svg>
