<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Curve fitting workflow</title>
  <desc id="desc">Quotes, CurveSpec, kernel choice, and method choice feed YieldCurve.fit. The result is a YieldCurve with query methods and a calibration report.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d8e1eb; stroke-width: 1.5; rx: 18; ry: 18; }
      .box { stroke-width: 1.6; rx: 12; ry: 12; }
      .input { stroke: #c2410c; fill: #fff7ed; }
      .fit { stroke: #2563eb; fill: #eff6ff; }
      .curve { stroke: #0f766e; fill: #f0fdfa; }
      .report { stroke: #7c3aed; fill: #f5f3ff; }
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 17px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #475569; }
      .center { text-anchor: middle; }
      .middle { dominant-baseline: middle; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="360"/>
  <rect class="panel" x="24" y="24" width="1072" height="312"/>
  <text x="560" y="68" class="title center">Main workflow</text>

  <rect x="58" y="95" width="190" height="48" class="box input"/>
  <text x="153" y="119" class="label center middle">quotes</text>

  <rect x="58" y="160" width="190" height="48" class="box input"/>
  <text x="153" y="184" class="label center middle">CurveSpec</text>

  <rect x="58" y="225" width="190" height="48" class="box input"/>
  <text x="153" y="249" class="label center middle">kernel</text>

  <rect x="58" y="290" width="190" height="34" class="box input"/>
  <text x="153" y="307" class="label center middle">method</text>

  <rect x="370" y="152" width="210" height="88" class="box fit"/>
  <text x="475" y="179" class="label center middle">YieldCurve.fit</text>
  <text x="475" y="211" class="small center">validates inputs</text>
  <text x="475" y="229" class="small center">builds the fitted curve</text>

  <path d="M 248 119 C 300 119 312 166 370 170" class="soft-line"/>
  <path d="M 248 184 C 304 184 316 190 370 190" class="soft-line"/>
  <path d="M 248 249 C 304 249 316 214 370 214" class="soft-line"/>
  <path d="M 248 307 C 306 307 316 234 370 230" class="soft-line"/>

  <rect x="670" y="152" width="200" height="88" class="box curve"/>
  <text x="770" y="179" class="label center middle">YieldCurve</text>
  <text x="770" y="211" class="small center">rate_at</text>
  <text x="770" y="229" class="small center">discount_factor_at</text>

  <path d="M 580 196 L 670 196" class="line"/>

  <rect x="930" y="104" width="130" height="60" class="box curve"/>
  <text x="995" y="123" class="label center middle">queries</text>
  <text x="995" y="150" class="small center">rates, factors</text>

  <rect x="910" y="230" width="170" height="60" class="box report"/>
  <text x="995" y="249" class="label center middle">report</text>
  <text x="995" y="276" class="small center">fit rows, residuals</text>

  <path d="M 870 177 C 894 177 902 134 930 134" class="line"/>
  <path d="M 870 215 C 894 215 902 260 910 260" class="line"/>
</svg>
